version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    pre_install:
      # Build-system dependencies required to compile Cython extensions
      - pip install -U pip setuptools numpy cython PyCyBase PyEventEngine
    pre_build:
      - pip install -U .

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false

python:
  install:
    - requirements: docs/requirements.txt
