version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    pre_install:
      # Build-system dependencies required to compile Cython extensions
      - pip install numpy cython PyCyBase "PyEventEngine>=0.5.1"

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false

python:
  install:
    # Install the package itself — triggers build_ext for Cython extensions,
    # which autodoc needs at import time
    - method: pip
      path: .
    # Doc-specific dependencies (theme, extensions)
    - requirements: docs/requirements.txt
