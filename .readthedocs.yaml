version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    pre_install:
      # Build-system dependencies required to compile Cython extensions
      - pip install numpy cython PyCyBase "PyEventEngine>=0.5.1"
    pre_build:
      # --no-build-isolation: reuse pre_install packages instead of creating
      # a fresh venv that can't find them (avoids exit-code -4 crash)
      - pip install --no-build-isolation .

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false

python:
  install:
    - requirements: docs/requirements.txt
